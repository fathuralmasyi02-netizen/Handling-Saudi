<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handling Haji Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@900&family=Mulish:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --font-header: 'Martel', serif; --font-body: 'Mulish', sans-serif; }
        body {
            background: #0f172a linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; font-family: var(--font-body); color: #f8fafc;
        }
        .glass-card { background: rgba(255, 255, 255, 0.98); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); color: #1e293b; }
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #1e293b; }
        #sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        .overlay.active { display: block; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1002] bg-yellow-500 text-blue-950 p-3 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="p-8 flex flex-col items-center border-b border-gray-100">
            <h2 style="font-family: var(--font-header);" class="text-blue-900 font-black uppercase text-xs text-center tracking-tighter">Jejak Imani<br>Operational</h2>
        </div>
        <div class="p-3 space-y-1 overflow-y-auto">
            <button onclick="showDashboard(); toggleSidebar()" class="w-full text-left p-4 rounded-lg hover:bg-gray-100 font-bold text-xs text-blue-900 uppercase tracking-widest">🏠 Dashboard</button>
            <button onclick="changeSheet('LOGISTIK KAMAR'); toggleSidebar()" class="w-full text-left p-4 rounded-lg hover:bg-gray-100 font-bold text-xs text-gray-600 uppercase tracking-widest">📦 Logistik Kamar</button>
        </div>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-24 text-center">
        <h1 id="pageTitle" class="text-3xl font-black uppercase italic tracking-tighter text-white mb-2" style="font-family: var(--font-header);">Dashboard</h1>
        <div id="statusBadge" class="inline-block mb-8 px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest text-yellow-400">Syncing...</div>

        <div id="filterBar" class="hidden space-y-3 mb-8">
            <div class="flex gap-2">
                <input type="text" id="searchKamar" oninput="applyFilters()" placeholder="No. Kamar..." class="flex-1 p-4 rounded-2xl bg-white text-blue-900 font-bold text-sm shadow-xl outline-none">
                <select id="filterStatus" onchange="applyFilters()" class="p-4 rounded-2xl bg-white text-blue-900 font-bold text-xs shadow-xl outline-none border-none">
                    <option value="">Semua Status</option>
                    <option value="Belum">Belum</option>
                    <option value="Proses">Proses</option>
                    <option value="Lengkap">Lengkap</option>
                    <option value="Perlu Refill">Perlu Refill 🔴</option>
                </select>
            </div>
        </div>

        <div id="dynamicContent" class="grid grid-cols-1 gap-4"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyIvXmJMUsKDkQASjwdacvOgi6B8WRy_w3qePVlnNEUkoGaiVA8cJ31uRg_frJ7ugVQ5w/exec"; 
        const SOP_ITEMS = [
            "Ajwa Almadina Malaki", "Alkhair Chai Karak Cardamom teh tarik", "Alkhair Chai Karak Ginger", "Amada Cokelat Mood Dark",
            "Baja Cashew", "Baja Deluxe Mix", "Baja Extra Mix", "Baja Peanuts", "Baja Sweet & Salty Mix", "Basket Fruits",
            "Bounty Chocolate Coconuts 28.5gr", "Chiki Batal Cheese", "Chiki Batal Pop Corn Caramel", "Chiki Batal Yogurt",
            "Chiki XL Cheese", "Cornitos Nacho Crisps", "Harvest Coconut Water", "Juice Almarai Manggo 200ml", "Juice Almarai Mix Fruits 200ml",
            "Juice Almarai Orange 200ml", "Kinza Soda Citrus", "Memories Joy Cocoa Cream Wafers", "Pop Mie mix", "Pronto",
            "Ritz Crackers Original", "Sukkari Arjoon", "Susu Almarai Caramel 225ml", "Susu Almarai Cokelat 225ml", "Susu Almarai Manggo 225ml",
            "Susu Almarai Strawberry 225ml", "Tiffany Break Waffer Crunchy", "Ulker Cikolata Cokelat Dubai", "Ulker Napoliten Milk Chocolate",
            "Zamzam 5 liter", "Barari Tea", "Kopi Baja Classic Coffee Mild", "Madu Kalina 250gr", "Gula Stevia Tropicana Slim",
            "Gula Tropicana Slim Low Calories", "Sendok Teh", "Gelas Kertas"
        ];

        let appData = null;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }

        async function init() {
            try {
                const res = await fetch(API_URL);
                appData = await res.json();
                document.getElementById('statusBadge').innerText = "Data Live Sync";
                document.getElementById('statusBadge').className = "inline-block mb-8 px-3 py-1 bg-green-500/20 rounded-full text-[10px] font-bold uppercase tracking-widest text-green-400";
                showDashboard();
            } catch (e) { document.getElementById('statusBadge').innerText = "Koneksi Error"; }
        }

        function showDashboard() {
            document.getElementById('pageTitle').innerText = "Dashboard";
            document.getElementById('filterBar').classList.add('hidden');
            let html = ``;
            for (const name in appData) {
                html += `<div onclick="changeSheet('${name}')" class="glass-card p-6 flex justify-between items-center cursor-pointer active:scale-95 transition-transform">
                    <div class="text-left"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${name}</p><h3 class="text-2xl font-black text-blue-900">${appData[name].length} Data</h3></div>
                    <div class="text-blue-900"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></div>
                </div>`;
            }
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function changeSheet(name) {
            document.getElementById('pageTitle').innerText = name;
            if (name === "LOGISTIK KAMAR") {
                document.getElementById('filterBar').classList.remove('hidden');
                applyFilters();
            } else {
                document.getElementById('filterBar').classList.add('hidden');
                renderDefaultTable(appData[name]);
            }
        }

        function applyFilters() {
            const query = document.getElementById('searchKamar').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const filtered = appData["LOGISTIK KAMAR"].filter(r => {
                const matchKamar = r['Nomor Kamar'].toString().toLowerCase().includes(query);
                const matchStatus = !status || r['Status'] === status;
                return matchKamar && matchStatus;
            });
            renderLogistikGrid(filtered);
        }

        function renderLogistikGrid(rows) {
            let html = `<div class="grid grid-cols-2 md:grid-cols-3 gap-3">`;
            rows.forEach(row => {
                let bgColor = "bg-white";
                if(row['Status'] === "Perlu Refill") bgColor = "bg-red-50 border-red-500 animate-pulse";
                else if(row['Status'] === "Lengkap") bgColor = "bg-green-50 border-green-500";

                html += `<div onclick="openModalLogistik('${row['Nomor Kamar']}', '${row['Hotel']}', '${row['Status']}', '${row['Catatan']}')" 
                     class="glass-card p-4 border-2 ${bgColor} cursor-pointer active:scale-95 transition-all text-left">
                    <p class="text-[8px] font-bold text-blue-400 uppercase">${row['Hotel']}</p>
                    <h3 class="text-lg font-black text-blue-900">Kamar ${row['Nomor Kamar']}</h3>
                    <p class="text-[9px] text-gray-400 mt-2 font-bold uppercase">${row['Status'] || 'Pending'}</p>
                </div>`;
            });
            document.getElementById('dynamicContent').innerHTML = html + `</div>`;
        }

        function openModalLogistik(noKamar, hotel, currentStatus, currentCatatan) {
            const modalHtml = `
            <div id="modalLogistik" class="fixed inset-0 z-[2000] flex items-end md:items-center justify-center p-4">
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
                <div class="glass-card w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col z-[2001] animate-slideUp">
                    <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                        <div class="text-left"><h2 class="text-xl font-black italic">Kamar ${noKamar}</h2><p class="text-[10px] uppercase opacity-70">${hotel}</p></div>
                        <button onclick="closeModal()" class="text-2xl font-bold">×</button>
                    </div>
                    <div class="p-6 overflow-y-auto bg-white text-left space-y-4">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">SOP Checklist (41 Item)</p>
                        <div class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto p-2 bg-gray-50 rounded-xl">
                            ${SOP_ITEMS.map(item => `
                                <label class="flex items-center gap-3 p-2 hover:bg-white rounded transition-colors">
                                    <input type="checkbox" class="w-4 h-4 rounded text-blue-900 border-gray-300">
                                    <span class="text-[11px] font-bold text-gray-700">${item}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase">Update Status</label>
                            <select id="updateStatus" class="w-full mt-1 p-3 bg-gray-100 border rounded-xl font-bold text-blue-900">
                                <option value="Belum" ${currentStatus === 'Belum' ? 'selected' : ''}>Belum Diisi</option>
                                <option value="Proses" ${currentStatus === 'Proses' ? 'selected' : ''}>Dalam Proses</option>
                                <option value="Lengkap" ${currentStatus === 'Lengkap' ? 'selected' : ''}>Lengkap (Sesuai SOP)</option>
                                <option value="Perlu Refill" ${currentStatus === 'Perlu Refill' ? 'selected' : ''}>Perlu Refill 🔴</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase">Catatan</label>
                            <textarea id="updateCatatan" class="w-full mt-1 p-3 bg-gray-100 border rounded-xl text-xs" rows="2">${currentCatatan}</textarea>
                        </div>
                        <button id="btnSimpan" onclick="saveData('${noKamar}')" class="w-full py-4 bg-yellow-500 text-blue-950 font-black uppercase text-xs rounded-2xl shadow-xl active:scale-95 transition-all">SIMPAN PERUBAHAN</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function saveData(noKamar) {
            const btn = document.getElementById('btnSimpan');
            const status = document.getElementById('updateStatus').value;
            const catatan = document.getElementById('updateCatatan').value;
            btn.innerText = "MENGIRIM..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ noKamar: noKamar, status: status, catatan: catatan }) });
                alert("Berhasil!"); closeModal(); init();
            } catch (e) { alert("Gagal kirim"); } finally { btn.innerText = "SIMPAN PERUBAHAN"; btn.disabled = false; }
        }

        function closeModal() { const m = document.getElementById('modalLogistik'); if(m) m.remove(); }
        init();
    </script>
</body>
</html>
