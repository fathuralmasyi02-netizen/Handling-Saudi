<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handling Haji Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@700;900&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --font-header: 'Martel', serif; --font-body: 'Mulish', sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://lh3.googleusercontent.com/d/1Z1T7W1TGe8a3I0PCWwV9yWTwmto5YHNM') no-repeat center center fixed;
            background-size: cover;
            font-family: var(--font-body);
        }
        .glass-card { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .nav-button.active { color: #b48c04; font-weight: 800; border-bottom: 3px solid #fbbf24; }
        
        /* Floating Menu */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .fab-main { width: 60px; height: 60px; border-radius: 50%; background: #fbbf24; color: #1e3a8a; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.3s; }
        .fab-main:hover { transform: scale(1.1); }
        .fab-options { position: absolute; bottom: 70px; right: 0; display: none; flex-direction: column; gap: 10px; transition: all 0.3s; }
        .fab-options.active { display: flex; }
        .fab-item { background: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 14px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; color: #1e3a8a; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex flex-col items-center py-10">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-28 mb-6 drop-shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-black text-white text-center tracking-tight uppercase drop-shadow-lg" style="font-family: var(--font-header);">Handling Haji 2026</h1>
            <p class="text-yellow-400 font-bold tracking-[0.2em] mt-2 uppercase text-sm">Jejak Imani Operasional</p>
        </div>

        <div class="glass-card mb-8 sticky top-4 z-50 overflow-x-auto">
            <nav class="flex justify-around p-1 whitespace-nowrap" id="mainNav"></nav>
        </div>

        <div id="tableContent" class="space-y-6"></div>
    </div>

    <div class="fab-container">
        <div class="fab-options" id="fabOptions">
            <a href="URL_FORM_LOGISTIK" target="_blank" class="fab-item">+ Input Logistik Kamar</a>
            <a href="URL_FORM_CHECKLIST" target="_blank" class="fab-item">+ Input Perlengkapan</a>
            <a href="URL_FORM_ROOMLIST" target="_blank" class="fab-item">+ Input Roomlist</a>
            <a href="URL_FORM_KEGIATAN" target="_blank" class="fab-item">+ Input Jadwal Kegiatan</a>
        </div>
        <div class="fab-main" onclick="toggleFab()">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbycNAnDYB_9n-O89nfMKomT9Mt5Y7VBnOaRifbOc3x43PQZFZM7NroUl_fWRDlz-_cLTA/exec"; 
        let appData = {};

        function toggleFab() { document.getElementById('fabOptions').classList.toggle('active'); }

        async function init() {
            try {
                const response = await fetch(API_URL);
                appData = await response.json();
                const sheets = Object.keys(appData);
                createMenu(sheets);
                showSheet(sheets[0]); 
            } catch (e) { console.error(e); }
        }

        function createMenu(sheetNames) {
            const nav = document.getElementById('mainNav');
            nav.innerHTML = sheetNames.map(name => `<button onclick="showSheet('${name}')" id="btn-${name}" class="nav-button px-6 py-4 text-sm font-bold text-blue-900 hover:text-yellow-600 uppercase tracking-widest">${name}</button>`).join('');
        }

        function showSheet(name) {
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${name}`).classList.add('active');
            const rows = appData[name];
            const container = document.getElementById('tableContent');
            
            container.innerHTML = `
                <div class="glass-card overflow-hidden">
                    <div class="overflow-x-auto p-4">
                        <table class="w-full text-left text-sm" id="dataTable">
                            <thead>
                                <tr class="border-b-2 border-blue-100 text-blue-900">
                                    ${Object.keys(rows[0]).map(h => `<th class="px-5 py-4 font-black uppercase text-xs">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${rows.map(row => `<tr>${Object.values(row).map(v => `<td class="px-5 py-4 text-gray-700 font-medium">${v}</td>`).join('')}</tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }
        init();
    </script>
</body>
</html>
