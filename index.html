<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handling Haji Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@700;900&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --font-header: 'Martel', serif; --font-body: 'Mulish', sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://lh3.googleusercontent.com/d/1Z1T7W1TGe8a3I0PCWwV9yWTwmto5YHNM') no-repeat center center fixed;
            background-size: cover;
            font-family: var(--font-body);
        }
        .glass-card { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Sidebar Styles */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: white; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        #sidebar.active { left: 0; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 999;
        }
        .overlay.active { display: block; }

        /* Floating Menu */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .fab-main { width: 60px; height: 60px; border-radius: 50%; background: #fbbf24; color: #1e3a8a; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); cursor: pointer; transition: 0.3s; }
        .fab-options { position: absolute; bottom: 75px; right: 0; display: none; flex-direction: column; gap: 12px; }
        .fab-options.active { display: flex; }
        .fab-item { background: white; padding: 12px 20px; border-radius: 12px; font-weight: 800; font-size: 13px; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: #1e3a8a; text-transform: uppercase; border-left: 4px solid #fbbf24; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1001] text-white bg-blue-900 p-3 rounded-xl shadow-2xl hover:bg-yellow-500 transition-all active:scale-90">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebar" class="flex flex-col">
        <div class="p-8 flex flex-col items-center border-b bg-gray-50">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-20 mb-4">
            <h2 style="font-family: var(--font-header);" class="text-blue-900 font-bold uppercase tracking-tighter text-center">Jejak Imani<br>Operational</h2>
        </div>
        <div id="sidebarMenu" class="flex flex-col p-4 overflow-y-auto">
            <p class="text-gray-400 p-4 italic text-sm">Menghubungkan data...</p>
        </div>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="max-w-6xl mx-auto px-4">
        <div class="flex flex-col items-center py-12">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-28 mb-6 drop-shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-black text-white text-center tracking-tight uppercase drop-shadow-lg" style="font-family: var(--font-header);">Handling Haji 2026</h1>
            <p class="text-yellow-400 font-bold tracking-[0.2em] mt-2 uppercase text-xs">Saudi Operational System</p>
        </div>

        <div class="glass-card p-4 mb-8 flex items-center gap-4">
            <svg class="w-6 h-6 text-blue-900 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/></svg>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama, kamar, atau item..." class="w-full bg-transparent outline-none text-lg font-bold text-blue-900 placeholder-blue-300">
        </div>

        <div id="tableContent" class="space-y-6">
            <div class="text-center py-20 text-white font-bold animate-pulse text-lg tracking-widest uppercase">Sinkronisasi Database...</div>
        </div>
    </div>

    <div class="fab-container">
        <div class="fab-options" id="fabOptions">
            <a href="https://forms.gle/tK9kMSKDvfixnDfK6" target="_blank" class="fab-item">📝 Logistik Kamar</a>
            <a href="https://forms.gle/akcSTxfaA2dXjPdB8" target="_blank" class="fab-item">📦 Perlengkapan Umum</a>
            <a href="https://forms.gle/WVNkUTYRRmEErbuw9" target="_blank" class="fab-item">👥 Roomlist Jamaah</a>
            <a href="https://forms.gle/UoKDFbugi4xsGA2j6" target="_blank" class="fab-item">📅 Jadwal Kegiatan</a>
        </div>
        <div class="fab-main" onclick="toggleFab()">
            <svg id="fabIcon" class="w-8 h-8 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
        </div>
    </div>

    <script>
        const API_URL = "URL_APPS_SCRIPT_ANDA_DI_SINI"; 
        let appData = {};

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function toggleFab() { 
            const opt = document.getElementById('fabOptions');
            const icon = document.getElementById('fabIcon');
            opt.classList.toggle('active');
            icon.style.transform = opt.classList.contains('active') ? 'rotate(45deg)' : 'rotate(0deg)';
        }

        async function init() {
            try {
                const response = await fetch(API_URL);
                appData = await response.json();
                const sheets = Object.keys(appData);
                renderSidebar(sheets);
                showSheet(sheets[0]); 
            } catch (e) { 
                document.getElementById('tableContent').innerHTML = `<div class='glass-card p-10 text-center text-red-600 font-bold'>Error: Cek Koneksi atau API URL</div>`;
            }
        }

        function renderSidebar(sheets) {
            const container = document.getElementById('sidebarMenu');
            container.innerHTML = sheets.map(name => `
                <button onclick="showSheet('${name}'); toggleSidebar()" class="w-full text-left p-5 rounded-xl hover:bg-blue-50 text-blue-900 font-bold uppercase text-[11px] tracking-widest border-b border-gray-50 transition-all active:bg-blue-100">
                    ${name}
                </button>
            `).join('');
        }

        function showSheet(name) {
            const rows = appData[name];
            const container = document.getElementById('tableContent');
            if(!rows || rows.length === 0) return;

            container.innerHTML = `
                <div class="glass-card overflow-hidden">
                    <div class="bg-blue-900 px-6 py-4 flex justify-between items-center">
                        <h3 class="text-white font-bold text-sm tracking-widest uppercase" style="font-family: var(--font-header);">${name}</h3>
                        <span class="bg-yellow-500 text-blue-900 text-[10px] font-black px-2 py-1 rounded">${rows.length} DATA</span>
                    </div>
                    <div class="overflow-x-auto p-2">
                        <table class="w-full text-left text-sm" id="dataTable">
                            <thead>
                                <tr class="text-blue-900 border-b-2 border-blue-50">
                                    ${Object.keys(rows[0]).map(h => `<th class="px-5 py-4 font-black uppercase text-[10px] tracking-tighter">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${rows.map(row => `<tr class="hover:bg-blue-50/50 transition-colors">${Object.values(row).map(v => `<td class="px-5 py-4 text-gray-700 font-medium text-xs">${v}</td>`).join('')}</tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const tr = document.querySelectorAll("#dataTable tbody tr");
            tr.forEach(row => row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none");
        }

        init();
    </script>
</body>
</html>
