<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@700;900&family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b8860b; 
            --gold-bright: #d4af37;
            --soft-bg: #f8fafc;
            --font-header: 'Martel', serif; 
            --font-body: 'Mulish', sans-serif; 
        }
        
        body {
            background: linear-gradient(rgba(248, 250, 252, 0.95), rgba(248, 250, 252, 0.95)), 
                        url('https://lh3.googleusercontent.com/d/1Z1T7W1TGe8a3I0PCWwV9yWTwmto5YHNM') no-repeat center center fixed;
            background-size: cover; 
            font-family: var(--font-body); 
            color: #1e293b;
        }

        .glass-card-light { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }

        .filter-input {
            background: white; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 12px 16px; font-size: 12px; font-weight: 700; color: #1e293b;
            outline: none; transition: all 0.2s;
        }

        .filter-input:focus {
            border-color: var(--gold-bright);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: white; font-weight: 800;
        }

        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: white; border-right: 1px solid #e2e8f0;
            z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        #sidebar.active { left: 0; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.2); display: none; z-index: 1000; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .refill-alert { animation: pulse-red 1.5s infinite; border: 2px solid #ef4444 !important; background: #fff1f2 !important; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1002] bg-white p-3.5 rounded-2xl shadow-xl border border-slate-100">
        <svg class="w-6 h-6 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="p-8 flex flex-col items-center border-b border-slate-50">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-20 mb-4 object-contain">
            <h2 style="font-family: var(--font-header);" class="text-slate-800 font-black uppercase text-[11px] text-center tracking-[0.2em]">Operational<br><span style="color:var(--gold)">Haji 2026</span></h2>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="renderDashboard(); toggleSidebar()" class="w-full text-left p-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center gap-3 active:bg-slate-50">🏠 Dashboard</button>
            <button onclick="changeSheet('LOGISTIK KAMAR'); toggleSidebar()" class="w-full text-left p-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center gap-3 active:bg-slate-50">📦 Logistik Kamar</button>
        </nav>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-24 text-center">
        <div class="flex justify-center mb-4">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Jejak Imani" class="h-16 object-contain">
        </div>
        <h1 id="pageTitle" class="text-4xl font-black uppercase tracking-tighter text-slate-800 mb-6" style="font-family: var(--font-header);">Dashboard</h1>

        <div id="filterContainer" class="hidden grid grid-cols-1 md:grid-cols-3 gap-3 mb-8">
            <input type="text" id="searchKamar" oninput="applyFilters()" placeholder="Cari No. Kamar..." class="filter-input w-full">
            <select id="filterHotel" onchange="applyFilters()" class="filter-input w-full">
                <option value="">Semua Hotel</option>
                <option value="Makkah">Makkah</option>
                <option value="Madinah">Madinah</option>
                <option value="Transit">Transit</option>
            </select>
            <select id="filterStatus" onchange="applyFilters()" class="filter-input w-full">
                <option value="">Semua Status</option>
                <option value="Belum">Belum Diisi</option>
                <option value="Proses">Dalam Proses</option>
                <option value="Lengkap">Lengkap</option>
                <option value="Perlu Refill">Perlu Refill 🔴</option>
            </select>
        </div>

        <div id="dynamicContent" class="grid grid-cols-1 gap-5"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwzxOSIiYaNcH2K4hNGWhR1IgK9TdZevG0kKtQFiIjo6V0Xuszzpr4UM3UhhrHGOpNV8w/exec"; 
        const SOP_ITEMS = [
            "Ajwa Almadina Malaki", "Alkhair Chai Karak Cardamom teh tarik", "Alkhair Chai Karak Ginger", "Amada Cokelat Mood Dark",
            "Baja Cashew", "Baja Deluxe Mix", "Baja Extra Mix", "Baja Peanuts", "Baja Sweet & Salty Mix", "Basket Fruits",
            "Bounty Chocolate Coconuts 28.5gr", "Chiki Batal Cheese", "Chiki Batal Pop Corn Caramel", "Chiki Batal Yogurt",
            "Chiki XL Cheese", "Cornitos Nacho Crisps", "Harvest Coconut Water", "Juice Almarai Manggo 200ml", "Juice Almarai Mix Fruits 200ml",
            "Juice Almarai Orange 200ml", "Kinza Soda Citrus", "Memories Joy Cocoa Cream Wafers", "Pop Mie mix", "Pronto",
            "Ritz Crackers Original", "Sukkari Arjoon", "Susu Almarai Caramel 225ml", "Susu Almarai Cokelat 225ml", "Susu Almarai Manggo 225ml",
            "Susu Almarai Strawberry 225ml", "Tiffany Break Waffer Crunchy", "Ulker Cikolata Cokelat Dubai", "Ulker Napoliten Milk Chocolate",
            "Zamzam 5 liter", "Barari Tea", "Kopi Baja Classic Coffee Mild", "Madu Kalina 250gr", "Gula Stevia Tropicana Slim",
            "Gula Tropicana Slim Low Calories", "Sendok Teh", "Gelas Kertas"
        ];

        let appData = null;

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.querySelector('.overlay').classList.toggle('active'); 
        }

        async function init() {
            try {
                const res = await fetch(API_URL);
                appData = await res.json();
                renderDashboard();
            } catch (e) { console.error("Error Syncing"); }
        }

        function renderDashboard() {
            document.getElementById('pageTitle').innerText = "Dashboard";
            document.getElementById('filterContainer').classList.add('hidden');
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-1 gap-5";
            let html = ``;
            for (const name in appData) {
                html += `
                <div onclick="changeSheet('${name}')" class="glass-card-light p-8 flex justify-between items-center cursor-pointer hover:border-gold/30">
                    <div class="text-left">
                        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">${name}</p>
                        <h3 class="text-2xl font-black text-slate-800">${appData[name].length} Data</h3>
                    </div>
                    <div class="text-gold"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></div>
                </div>`;
            }
            container.innerHTML = html;
        }

        function changeSheet(name) {
            document.getElementById('pageTitle').innerText = name;
            if (name === "LOGISTIK KAMAR") {
                document.getElementById('filterContainer').classList.remove('hidden');
                applyFilters();
            } else {
                document.getElementById('filterContainer').classList.add('hidden');
                container.innerHTML = `<p class='text-slate-400 font-bold'>Data ${name} tidak didukung tampilan Grid.</p>`;
            }
        }

        function applyFilters() {
            const search = document.getElementById('searchKamar').value.toLowerCase();
            const hotel = document.getElementById('filterHotel').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            
            const filtered = appData["LOGISTIK KAMAR"].filter(r => {
                const matchKamar = r['Nomor Kamar'].toString().toLowerCase().includes(search);
                const matchHotel = !hotel || r['Hotel'].toString().toLowerCase().includes(hotel);
                const matchStatus = !status || r['Status'] === status;
                return matchKamar && matchHotel && matchStatus;
            });
            renderLogistikGrid(filtered);
        }

        function renderLogistikGrid(rows) {
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-2 md:grid-cols-3 gap-4";
            let html = ``;
            rows.forEach(row => {
                let isRefill = row['Status'] === "Perlu Refill";
                let statusClass = isRefill ? "refill-alert" : "";
                let catatanPreview = row['Catatan'] ? row['Catatan'] : (row['Status'] || 'Pending');
                let icon = isRefill ? "🔔" : "";

                html += `
                <div onclick="openModalLogistik('${row['Nomor Kamar']}', '${row['Hotel']}', '${row['Status']}', '${row['Catatan']}')" 
                     class="glass-card-light p-5 border-b-4 border-slate-100 ${statusClass} cursor-pointer text-left transition-all active:scale-95">
                    <div class="flex justify-between items-start mb-1">
                        <p class="text-[8px] font-black text-gold uppercase tracking-widest">${row['Hotel']}</p>
                        <span class="text-[10px]">${icon}</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-800">Room ${row['Nomor Kamar']}</h3>
                    <p class="mt-2 text-[9px] font-bold ${isRefill ? 'text-red-600' : 'text-slate-400'} uppercase line-clamp-2 leading-tight">
                        ${catatanPreview}
                    </p>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openModalLogistik(noKamar, hotel, currentStatus, currentCatatan) {
            const modalHtml = `
            <div id="modalLogistik" class="fixed inset-0 z-[2000] flex items-end md:items-center justify-center p-4">
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
                <div class="glass-card-light w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col z-[2001] animate-slideUp">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white">
                        <div class="text-left"><h2 class="text-2xl font-black text-slate-800">ROOM ${noKamar}</h2><p class="text-[10px] font-bold text-gold uppercase">${hotel}</p></div>
                        <button onclick="closeModal()" class="text-2xl font-black text-slate-300">×</button>
                    </div>
                    <div class="p-6 overflow-y-auto space-y-6 text-left bg-white">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Checklist SOP</label>
                            <div class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto p-3 bg-slate-50 rounded-2xl border">
                                ${SOP_ITEMS.map(item => `<label class="flex items-center gap-3 p-3 bg-white rounded-xl border border-transparent hover:border-gold/20 cursor-pointer"><input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-gold focus:ring-gold"><span class="text-[11px] font-bold text-slate-600">${item}</span></label>`).join('')}
                            </div>
                        </div>
                        <select id="updateStatus" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-extrabold text-slate-800 outline-none">
                            <option value="Belum" ${currentStatus === 'Belum' ? 'selected' : ''}>BELUM DIISI</option>
                            <option value="Proses" ${currentStatus === 'Proses' ? 'selected' : ''}>PROSES</option>
                            <option value="Lengkap" ${currentStatus === 'Lengkap' ? 'selected' : ''}>LENGKAP</option>
                            <option value="Perlu Refill" ${currentStatus === 'Perlu Refill' ? 'selected' : ''}>REFILL REQUIRED 🔴</option>
                        </select>
                        <textarea id="updateCatatan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" rows="2" placeholder="Tulis catatan atau detail pesanan...">${currentCatatan}</textarea>
                        <button id="btnSimpan" onclick="saveData('${noKamar}')" class="btn-gold w-full py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-xs tracking-widest">SIMPAN PERUBAHAN</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function saveData(noKamar) {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "UPDATING..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ noKamar, status: document.getElementById('updateStatus').value, catatan: document.getElementById('updateCatatan').value }) });
                closeModal(); init();
            } catch (e) { alert("Error!"); btn.innerText = "SIMPAN PERUBAHAN"; btn.disabled = false; }
        }

        function closeModal() { const m = document.getElementById('modalLogistik'); if(m) m.remove(); }
        init();
    </script>
</body>
</html>
