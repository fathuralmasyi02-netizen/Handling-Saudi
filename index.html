<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@700;900&family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f1d592;
            --navy: #0f172a;
            --font-header: 'Martel', serif; 
            --font-body: 'Mulish', sans-serif; 
        }
        
        body {
            /* Menggunakan Background yang Anda berikan dengan overlay premium */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://lh3.googleusercontent.com/d/1Z1T7W1TGe8a3I0PCWwV9yWTwmto5YHNM') no-repeat center center fixed;
            background-size: cover; 
            font-family: var(--font-body); 
            color: #f8fafc;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            color: var(--navy);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: var(--navy);
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
        }

        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--navy); border-right: 2px solid var(--gold);
            z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        #sidebar.active { left: 0; }
        
        .nav-item { border-left: 4px solid transparent; transition: all 0.3s; }
        .nav-item:hover { background: rgba(212, 175, 55, 0.1); border-left: 4px solid var(--gold); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .refill-alert { animation: pulse-gold 2s infinite; border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1002] btn-gold p-3 rounded-xl shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="p-8 flex flex-col items-center border-b border-white/10">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-20 mb-4 object-contain">
            <h2 style="font-family: var(--font-header);" class="gold-gradient font-black uppercase text-[10px] text-center tracking-widest leading-tight">Operational<br>Haji 2026</h2>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="showDashboard(); toggleSidebar()" class="nav-item w-full text-left p-4 rounded-xl font-bold text-xs text-white uppercase tracking-widest flex items-center gap-3">
                <span>🏠</span> Dashboard
            </button>
            <button onclick="changeSheet('LOGISTIK KAMAR'); toggleSidebar()" class="nav-item w-full text-left p-4 rounded-xl font-bold text-xs text-gray-400 hover:text-white uppercase tracking-widest flex items-center gap-3">
                <span>📦</span> Logistik Kamar
            </button>
        </nav>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-24 text-center">
        <div class="flex justify-center mb-6">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Jejak Imani" class="h-16 object-contain">
        </div>

        <h1 id="pageTitle" class="text-4xl font-black uppercase italic tracking-tighter gold-gradient mb-2" style="font-family: var(--font-header);">Dashboard</h1>
        <div id="statusBadge" class="inline-block mb-8 px-4 py-1.5 bg-white/5 border border-white/10 rounded-full text-[10px] font-extrabold uppercase tracking-[0.2em] text-gold-light">
            Sistem Terkoneksi
        </div>

        <div id="dynamicContent" class="grid grid-cols-1 gap-6"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbykKKCG1rbdY_DIoOVzCbC33RzdCBdMElQfDQEkk8pAo6ziZWwFdeFz-_15cTGlK4vLzA/exec"; 
        const SOP_ITEMS = [
            "Ajwa Almadina Malaki", "Alkhair Chai Karak Cardamom teh tarik", "Alkhair Chai Karak Ginger", "Amada Cokelat Mood Dark",
            "Baja Cashew", "Baja Deluxe Mix", "Baja Extra Mix", "Baja Peanuts", "Baja Sweet & Salty Mix", "Basket Fruits",
            "Bounty Chocolate Coconuts 28.5gr", "Chiki Batal Cheese", "Chiki Batal Pop Corn Caramel", "Chiki Batal Yogurt",
            "Chiki XL Cheese", "Cornitos Nacho Crisps", "Harvest Coconut Water", "Juice Almarai Manggo 200ml", "Juice Almarai Mix Fruits 200ml",
            "Juice Almarai Orange 200ml", "Kinza Soda Citrus", "Memories Joy Cocoa Cream Wafers", "Pop Mie mix", "Pronto",
            "Ritz Crackers Original", "Sukkari Arjoon", "Susu Almarai Caramel 225ml", "Susu Almarai Cokelat 225ml", "Susu Almarai Manggo 225ml",
            "Susu Almarai Strawberry 225ml", "Tiffany Break Waffer Crunchy", "Ulker Cikolata Cokelat Dubai", "Ulker Napoliten Milk Chocolate",
            "Zamzam 5 liter", "Barari Tea", "Kopi Baja Classic Coffee Mild", "Madu Kalina 250gr", "Gula Stevia Tropicana Slim",
            "Gula Tropicana Slim Low Calories", "Sendok Teh", "Gelas Kertas"
        ];

        let appData = null;

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.querySelector('.overlay').classList.toggle('active'); 
        }

        async function init() {
            try {
                const res = await fetch(API_URL);
                appData = await res.json();
                renderDashboard();
            } catch (e) { console.error("Koneksi Gagal"); }
        }

        function renderDashboard() {
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-1 gap-6";
            let html = ``;
            for (const name in appData) {
                html += `
                <div onclick="changeSheet('${name}')" class="glass-card p-8 flex justify-between items-center cursor-pointer transition-all hover:translate-y-[-5px]">
                    <div class="text-left">
                        <p class="text-[10px] font-extrabold text-gold uppercase tracking-[0.3em] mb-1">${name}</p>
                        <h3 class="text-3xl font-black text-slate-800">${appData[name].length} <span class="text-sm font-normal text-slate-400 uppercase tracking-widest">Records</span></h3>
                    </div>
                    <div class="h-12 w-12 rounded-full bg-slate-100 flex items-center justify-center text-gold">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        function changeSheet(name) {
            document.getElementById('pageTitle').innerText = name;
            if (name === "LOGISTIK KAMAR") {
                renderLogistikGrid(appData[name]);
            } else {
                renderDefaultTable(appData[name]);
            }
        }

        function renderLogistikGrid(rows) {
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-2 md:grid-cols-3 gap-4";
            let html = ``;
            rows.forEach(row => {
                let statusStyle = "";
                let statusText = row['Status'] || "Pending";
                if(row['Status'] === "Perlu Refill") statusStyle = "refill-alert";
                if(row['Status'] === "Lengkap") statusStyle = "border-green-400 bg-green-50/30";

                html += `
                <div onclick="openModalLogistik('${row['Nomor Kamar']}', '${row['Hotel']}', '${row['Status']}', '${row['Catatan']}')" 
                     class="glass-card p-5 border-t-4 border-slate-200 ${statusStyle} cursor-pointer active:scale-95 transition-all text-left">
                    <p class="text-[9px] font-extrabold text-gold uppercase tracking-wider mb-1">${row['Hotel']}</p>
                    <h3 class="text-xl font-black text-slate-800 leading-tight">Room ${row['Nomor Kamar']}</h3>
                    <div class="mt-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full ${row['Status'] === 'Perlu Refill' ? 'bg-red-500' : 'bg-slate-400'}"></span>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${statusText}</p>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openModalLogistik(noKamar, hotel, currentStatus, currentCatatan) {
            const modalHtml = `
            <div id="modalLogistik" class="fixed inset-0 z-[2000] flex items-end md:items-center justify-center p-4">
                <div class="fixed inset-0 bg-navy/90 backdrop-blur-md" onclick="closeModal()"></div>
                <div class="glass-card w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col z-[2001] animate-slideUp" style="border: 2px solid var(--gold)">
                    <div class="p-6 btn-gold flex justify-between items-center shadow-lg">
                        <div class="text-left text-navy">
                            <h2 class="text-2xl font-black italic tracking-tighter" style="font-family: var(--font-header);">ROOM ${noKamar}</h2>
                            <p class="text-[10px] font-bold uppercase tracking-widest">${hotel}</p>
                        </div>
                        <button onclick="closeModal()" class="h-10 w-10 bg-navy/10 rounded-full text-2xl font-black">×</button>
                    </div>
                    <div class="p-6 overflow-y-auto bg-white text-left space-y-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">SOP Checklist</label>
                            <div class="grid grid-cols-1 gap-2 max-h-52 overflow-y-auto p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                ${SOP_ITEMS.map(item => `
                                    <label class="flex items-center gap-3 p-3 hover:bg-white rounded-xl transition-all cursor-pointer border border-transparent hover:border-gold/20">
                                        <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-gold focus:ring-gold">
                                        <span class="text-[11px] font-bold text-slate-700">${item}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Status & Catatan</label>
                            <select id="updateStatus" class="w-full mb-3 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-extrabold text-navy outline-none focus:border-gold">
                                <option value="Belum" ${currentStatus === 'Belum' ? 'selected' : ''}>BELUM DIISI</option>
                                <option value="Proses" ${currentStatus === 'Proses' ? 'selected' : ''}>DALAM PROSES</option>
                                <option value="Lengkap" ${currentStatus === 'Lengkap' ? 'selected' : ''}>LENGKAP (SOP)</option>
                                <option value="Perlu Refill" ${currentStatus === 'Perlu Refill' ? 'selected' : ''}>REFILL REQUIRED 🔴</option>
                            </select>
                            <textarea id="updateCatatan" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-gold" rows="2" placeholder="Catatan...">${currentCatatan}</textarea>
                        </div>
                        <button id="btnSimpan" onclick="saveData('${noKamar}')" class="btn-gold w-full py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-sm tracking-[0.2em]">
                            SIMPAN PERUBAHAN
                        </button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function saveData(noKamar) {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "SYNCHRONIZING..."; btn.disabled = true;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ noKamar: noKamar, status: document.getElementById('updateStatus').value, catatan: document.getElementById('updateCatatan').value })
                });
                closeModal(); init();
            } catch (e) { alert("Update Gagal!"); }
        }

        function closeModal() { const m = document.getElementById('modalLogistik'); if(m) m.remove(); }
        init();
    </script>
</body>
</html>
