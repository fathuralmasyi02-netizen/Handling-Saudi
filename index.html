<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martel:wght@700;900&family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --gold-bright: #d4af37; --font-header: 'Martel', serif; --font-body: 'Mulish', sans-serif; }
        body { background: #f8fafc; font-family: var(--font-body); color: #1e293b; }
        .glass-card-light { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border: 1px solid #e2e8f0; transition: 0.3s ease; }
        .filter-input { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px 16px; font-size: 12px; font-weight: 700; outline: none; }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); color: white; font-weight: 800; }
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: white; border-right: 1px solid #e2e8f0; z-index: 1001; transition: 0.4s ease; }
        #sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.2); display: none; z-index: 1000; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        .refill-alert { animation: pulse-red 1.5s infinite; border: 2px solid #ef4444 !important; background: #fff1f2 !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="min-h-screen">

    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1002] bg-white p-3.5 rounded-2xl shadow-xl border border-slate-100">
        <svg class="w-6 h-6 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebar" class="flex flex-col shadow-2xl">
        <div class="p-8 flex flex-col items-center border-b border-slate-50 text-center">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" class="h-16 mb-4">
            <h2 style="font-family: var(--font-header);" class="text-[11px] font-black uppercase tracking-widest">Operational<br><span style="color:var(--gold)">Haji 2026</span></h2>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="renderDashboard(); toggleSidebar()" class="w-full text-left p-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-50">🏠 Dashboard</button>
            <button onclick="changeSheet('LOGISTIK KAMAR'); toggleSidebar()" class="w-full text-left p-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-50">📦 Logistik Kamar</button>
            <button onclick="changeSheet('CHECKLIST PERLENGKAPAN'); toggleSidebar()" class="w-full text-left p-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-50">🎒 Perlengkapan Tim</button>
        </nav>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-24 text-center">
        <h1 id="pageTitle" class="text-4xl font-black uppercase tracking-tighter text-slate-800 mb-6" style="font-family: var(--font-header);">Dashboard</h1>

        <div id="filterContainer" class="hidden grid grid-cols-1 md:grid-cols-3 gap-3 mb-8">
            <input type="text" id="searchKamar" oninput="applyFilters()" placeholder="Cari No. Kamar..." class="filter-input w-full">
            <select id="filterHotel" onchange="applyFilters()" class="filter-input w-full">
                <option value="">Semua Hotel</option><option value="Makkah">Makkah</option><option value="Madinah">Madinah</option>
            </select>
            <select id="filterStatus" onchange="applyFilters()" class="filter-input w-full">
                <option value="">Semua Status</option><option value="Lengkap">Lengkap</option><option value="Perlu Refill">Perlu Refill 🔴</option>
            </select>
        </div>

        <div id="dynamicContent" class="grid grid-cols-1 gap-5"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw2B2qBjFpS6WklXnWmOEtP4h7wCLnrQVVlpYqooB2VjUQzVoi46-iw6lk37QeV8Cioug/exec";
        let appData = null;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }

        async function init() {
            try {
                const res = await fetch(API_URL);
                appData = await res.json();
                renderDashboard();
            } catch (e) { console.error("Sync Error"); }
        }

        function renderDashboard() {
            document.getElementById('pageTitle').innerText = "Dashboard";
            document.getElementById('filterContainer').classList.add('hidden');
            let html = ``;
            for (const name in appData) {
                html += `<div onclick="changeSheet('${name}')" class="glass-card-light p-8 flex justify-between items-center cursor-pointer mb-4">
                    <div class="text-left"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${name}</p><h3 class="text-2xl font-black text-slate-800">${appData[name].length} Item</h3></div>
                    <div class="text-gold"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></div>
                </div>`;
            }
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function changeSheet(name) {
            document.getElementById('pageTitle').innerText = name;
            const container = document.getElementById('dynamicContent');
            if (name === "LOGISTIK KAMAR") {
                document.getElementById('filterContainer').classList.remove('hidden');
                applyFilters();
            } else if (name === "CHECKLIST PERLENGKAPAN") {
                document.getElementById('filterContainer').classList.add('hidden');
                renderPerlengkapan(appData[name]);
            }
        }

        // --- LOGIKA LOGISTIK KAMAR ---
        function applyFilters() {
            const search = document.getElementById('searchKamar').value.toLowerCase();
            const filtered = appData["LOGISTIK KAMAR"].filter(r => r['Nomor Kamar'].toString().toLowerCase().includes(search));
            renderLogistik(filtered);
        }

        function renderLogistik(rows) {
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-2 md:grid-cols-3 gap-4";
            container.innerHTML = rows.map(row => `
                <div onclick="openModalLogistik('${row['Nomor Kamar']}', '${row['Hotel']}', '${row['Status']}', '${row['Catatan']}')" 
                     class="glass-card-light p-5 border-b-4 border-slate-100 ${row['Status'] === 'Perlu Refill' ? 'refill-alert' : ''} cursor-pointer text-left">
                    <p class="text-[8px] font-black text-gold uppercase">${row['Hotel']}</p>
                    <h3 class="text-xl font-black text-slate-800">Room ${row['Nomor Kamar']}</h3>
                    <p class="mt-2 text-[9px] font-bold text-slate-400 uppercase truncate">${row['Catatan'] || row['Status']}</p>
                </div>`).join('');
        }

        // --- LOGIKA PERLENGKAPAN TIM ---
        function renderPerlengkapan(rows) {
            const container = document.getElementById('dynamicContent');
            container.className = "grid grid-cols-1 md:grid-cols-2 gap-4";
            container.innerHTML = rows.map(row => `
                <div onclick="openModalBarang('${row['Nama Barang']}', '${row['Kategori']}', '${row['Qty']}', '${row['Status']}', '${row['Keterangan']}')" 
                     class="glass-card-light p-6 flex justify-between items-center cursor-pointer">
                    <div class="text-left">
                        <span class="px-2 py-0.5 bg-slate-100 text-[8px] font-black text-slate-500 rounded uppercase">${row['Kategori']}</span>
                        <h3 class="text-lg font-black text-slate-800">${row['Nama Barang']} (Qty: ${row['Qty']})</h3>
                        <p class="text-[10px] font-bold ${row['Status'] === 'Tersedia' ? 'text-green-600' : 'text-red-500'} uppercase">${row['Status']}</p>
                    </div>
                </div>`).join('');
        }

        function openModalBarang(nama, kategori, qty, status, keterangan) {
            const modalHtml = `
            <div id="modalBarang" class="fixed inset-0 z-[2000] flex items-center justify-center p-4">
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
                <div class="glass-card-light w-full max-w-md p-6 bg-white z-[2001] text-left">
                    <h2 class="text-xl font-black mb-4 uppercase">${nama}</h2>
                    <select id="updateStatusBarang" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 font-bold">
                        <option value="Tersedia" ${status === 'Tersedia' ? 'selected' : ''}>TERSEDIA</option>
                        <option value="Habis" ${status === 'Habis' ? 'selected' : ''}>HABIS / DIPAKAI</option>
                    </select>
                    <textarea id="updateKetBarang" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4" placeholder="Keterangan...">${keterangan}</textarea>
                    <button onclick="saveDataBarang('${nama}')" id="btnSave" class="btn-gold w-full py-4 rounded-2xl">UPDATE</button>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function saveDataBarang(nama) {
            const btn = document.getElementById('btnSave'); btn.innerText = "SAVING...";
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "PERLENGKAPAN", namaBarang: nama, status: document.getElementById('updateStatusBarang').value, keterangan: document.getElementById('updateKetBarang').value }) });
            location.reload();
        }

        function closeModal() { const m = document.getElementById('modalBarang'); if(m) m.remove(); }
        init();
    </script>
</body>
</html>
