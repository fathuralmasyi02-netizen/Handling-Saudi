<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handling Haji Jejak Imani 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Perbaikan Link Background */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://lh3.googleusercontent.com/d/1Z1T7W1TGe8a3I0PCWwV9yWTwmto5YHNM') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-button {
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }
        .nav-button.active {
            border-bottom: 3px solid #fbbf24;
            color: #fbbf24;
            font-weight: bold;
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex flex-col items-center py-8">
            <img src="https://lh3.googleusercontent.com/d/1eExbKZKwfOh58br_Jr6D71uqe-2Rue5r" alt="Logo" class="h-24 md:h-28 mb-4 drop-shadow-lg">
            <h1 class="text-2xl md:text-3xl font-extrabold text-white text-center tracking-tighter uppercase">
                Handling Haji Jejak Imani 2026
            </h1>
        </div>

        <div class="glass-card mb-6 sticky top-4 z-50 overflow-x-auto">
            <nav class="flex justify-around p-2 whitespace-nowrap" id="mainNav">
                <span class="p-4 text-gray-400">Memuat Menu...</span>
            </nav>
        </div>

        <div class="glass-card p-4 mb-6 flex items-center gap-3">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari data (Nama, Kamar, atau Barang)..." class="w-full bg-transparent outline-none text-sm">
        </div>

        <div id="tableContent" class="space-y-6">
            <div class="text-center py-20 text-white font-bold animate-pulse">MENGHUBUNGKAN KE DATABASE...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbycNAnDYB_9n-O89nfMKomT9Mt5Y7VBnOaRifbOc3x43PQZFZM7NroUl_fWRDlz-_cLTA/exec"; // GANTI DENGAN URL DEPLOY ANDA
        let appData = {};

        async function init() {
            try {
                const response = await fetch(API_URL);
                appData = await response.json();
                createMenu(Object.keys(appData));
                showSheet(Object.keys(appData)[0]); // Tampilkan sheet pertama otomatis
            } catch (e) {
                document.getElementById('tableContent').innerHTML = `<div class="glass-card p-10 text-center text-red-600 font-bold">Gagal memuat data. Periksa API URL.</div>`;
            }
        }

        function createMenu(sheetNames) {
            const nav = document.getElementById('mainNav');
            nav.innerHTML = sheetNames.map((name, index) => `
                <button onclick="showSheet('${name}')" id="btn-${name}" class="nav-button px-4 py-2 text-sm font-semibold text-blue-900 hover:text-yellow-600 uppercase tracking-wide">
                    ${name}
                </button>
            `).join('');
        }

        function showSheet(name) {
            // Update UI Button Active
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${name}`).classList.add('active');

            const rows = appData[name];
            const container = document.getElementById('tableContent');
            
            if (!rows || rows.length === 0) {
                container.innerHTML = `<div class="glass-card p-10 text-center">Data Kosong</div>`;
                return;
            }

            container.innerHTML = `
                <div class="glass-card overflow-hidden animate-fadeIn">
                    <div class="overflow-x-auto p-4">
                        <table class="w-full text-left text-sm" id="dataTable">
                            <thead>
                                <tr class="border-b-2 border-gray-100 text-blue-900">
                                    ${Object.keys(rows[0]).map(h => `<th class="px-4 py-3 font-bold">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                                ${rows.map(row => `
                                    <tr class="hover:bg-blue-50/50 transition-colors">
                                        ${Object.values(row).map(v => `<td class="px-4 py-3 text-gray-700">${v}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toUpperCase();
            const tr = document.querySelectorAll("#dataTable tbody tr");
            tr.forEach(row => {
                row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
            });
        }

        init();
    </script>
</body>
</html>
